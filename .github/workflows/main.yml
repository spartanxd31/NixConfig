name: "NixOS & Home Manager CI"

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  check-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 1. Install Nix onto the GitHub Runner
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      # 2. Start the Magic Nix Cache daemon
      # This sits in the background and catches every build result
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # 3. Build your NixOS system
      - name: Build NixOS System
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel

      # 4. Build your Home Manager config
      - name: Build Home Manager
        run: nix build .#homeConfigurations."dom@nixos".activationPackage
